# yaml-language-server: $schema=../../schema/template.schema.json
name: ARK Survival Evolved
description: ARK - Survival Evolved dedicated server with automatic backups and updates (based on https://github.com/Hermsi1337/docker-ark-server)
variables:
  - name: Session Name
    type: string
    placeholder: session_name
    example: 'My ARK Server'
    description: The name displayed in the server browser
  - name: Server Map
    type: select
    placeholder: server_map
    default: TheIsland
    options: ["TheIsland", "Ragnarok", "TheCenter", "ScorechedEarth_P", "Aberration_P", "Extinction", "CrystalIsles", "Valguero_P", "Genesis", "CrystalIsles", "Gen2", "LostIsland", "Fjordur"]
    description: The map to load on the server
  - name: Server Password
    type: string
    placeholder: server_password
    example: 'secret123'
    description: Password required for players to join the server (leave empty for no password)
  - name: Admin Password
    type: string
    placeholder: admin_password
    example: 'adminpass'
    description: Password for administrator access via the in-game console
  - name: Max Players
    type: string
    placeholder: max_players
    default: "10"
    example: '20'
    description: Maximum number of players allowed on the server at the same time
  - name: Update On Start
    type: boolean
    placeholder: update_on_start
    default: true
    description: Automatically update the server to the latest version on each start
  - name: Backup On Stop
    type: boolean
    placeholder: backup_on_stop
    default: true
    description: Automatically create a backup of the world when the server stops
tags:
  - survival
game_id: 6511
docker_image_name: hermsi/ark-server
docker_image_tag: latest
environment_variables:
  SESSION_NAME: '{{session_name}}'
  UPDATE_ON_START: '{{update_on_start}}'
  BACKUP_ON_STOP: '{{backup_on_stop}}'
  SERVER_MAP: '{{server_map}}'
  PRE_UPDATE_BACKUP: 'true'
  WARN_ON_STOP: 'true'
  SERVER_PASSWORD: '{{server_password}}'
  ADMIN_PASSWORD: '{{admin_password}}'
  MAX_PLAYERS: '{{max_players}}'
port_mapping:
  '7777/udp': 7777      # Game client connections
  '7778/udp': 7778      # Raw UDP socket
  '27020/tcp': 27020    # RCON management
  '27015/udp': 27015    # Steam server list
file_mounts:
  - /app                # Server data
  - /home/steam/ARK-Backups  # Backups
resource_limit:
  memory: 6GiB
  cpu: 3
