# yaml-language-server: $schema=../../schema/template.schema.json
name: Minecraft Purpur (MC-Router)
description: Purpur server (a Paper fork with extra performance tuning and configurable gameplay; supports Bukkit/Spigot/Paper plugins) routed through the MC-Router proxy. Not published to a host port; players reach it via the hostname you set below. Requires the "MC-Router (Proxy)" server to be running.
variables:
  - name: Minecraft Version
    type: string
    regex: \d\.\d+\.\d+
    placeholder: version
    example: '1.21.5'
    description: The Minecraft version to run. See https://purpurmc.org/downloads for supported versions.
  - name: Memory Allocation (in Gigabyte)
    type: string
    placeholder: memory
    example: '4'
    default: '4'
    description: Amount of RAM in gigabytes allocated to the server JVM
  - name: Router Hostname
    type: string
    regex: ^[A-Za-z0-9.-]+$
    placeholder: hostname
    example: 'smp.example.com'
    description: The address players connect to. The MC-Router proxy forwards connections for this hostname to this server. Requires the "MC-Router (Proxy)" server to be running.
tags:
  - purpur
  - plugins
  - mc-router
game_id: minecraft
docker_image_name: itzg/minecraft-server
docker_image_tag: latest
environment_variables:
  VERSION: '{{version}}'
  EULA: 'true'
  TYPE: 'PURPUR'
  MEMORY: '{{memory}}G'
annotations:
  mc-router.host: '{{hostname}}'
file_mounts:
  - /data
resource_limit:
  memory: '{{memory}}GiB'
  cpu: 2
