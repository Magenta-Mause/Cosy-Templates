# yaml-language-server: $schema=../../schema/template.schema.json
name: Terraria Vanilla
description: Vanilla Terraria Server (based on https://github.com/hexlo/terraria-server-docker)
variables:
  - name: Difficulty
    type: select
    placeholder: difficulty
    options: ["0", "1", "2", "3"]
    description: World difficulty (0 = Classic, 1 = Expert, 2 = Master, 3 = Journey)
  - name: Server Password
    type: string
    placeholder: password
    example: 'secret123'
    description: Password required for players to join the server (leave empty for no password)
  - name: Max Players
    type: string
    placeholder: max_players
    default: "8"
    example: '16'
    description: Maximum number of players allowed on the server at the same time
  - name: Motto of the day
    type: string
    placeholder: motd
    example: Johns Server - Join here :)
    description: Message displayed to players when they join the server
  - name: Language
    type: select
    placeholder: language
    options: ["en/US", "de/DE", "it/IT", "fr/FR", "es/ES", "ru/RU", "zh/Hans", "pt/BR", "pl/PL"]
    description: Server language
tags:
  - survival
  - vanilla
game_id: terraria
docker_image_name: hexlo/terraria-server-docker
docker_image_tag: latest
environment_variables:
  world: world.wld
  password: '{{password}}'
  difficulty: '{{difficulty}}'
  maxplayers: '{{max_players}}'
  motd: '{{motd}}'
  Language: '{{language}}'
port_mapping:
  '7777/tcp': 7777
file_mounts:
  - /root/.local/share/Terraria/Worlds
resource_limit:
  memory: 3GiB
  cpu: 1
