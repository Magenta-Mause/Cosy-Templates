# yaml-language-server: $schema=../../schema/template.schema.json
name: Terraria Vanilla
description: Vanilla Terraria Server (based on https://github.com/hexlo/terraria-server-docker)
variables:
  - name: Difficulty
    type: string
    placeholder: difficulty
    options: ["0", "1", "2", "3"]
  - name: Server Password
    type: string
    placeholder: password
    example: 'secret123'
  - name: Max Players
    type: string
    placeholder: max_players
    default: "8"
    example: '16'
  - name: Motto of the day
    type: string
    placeholder: motd
    example: Johns Server - Join here :)
  - name: Language
    type: string
    placeholder: language
    options: ["en/US", "de/DE", "it/IT", "fr/FR", "es/ES", "ru/RU", "zh/Hans", "pt/BR", "pl/PL"]
game_id: 1226
docker_image_name: hexlo/terraria-server-docker
docker_image_tag: latest
environment_variables:
  world: world.wld
  password: '{{password}}'
  difficulty: '{{difficulty}}'
  maxplayers: '{{max_players}}'
  motd: '{{motd}}'
  Language: '{{language}}'
port_mapping:
  '7777/tcp': 7777
file_mounts:
  - /root/.local/share/Terraria/Worlds
resource_limit:
  memory: 3GiB
  cpu: 1